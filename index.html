<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💼</text></svg>" />
  <title>JobTracker — Tu asistente de búsqueda laboral</title>
  <meta name="description"
    content="JobTracker: organizá tu búsqueda laboral, gestioná aplicaciones, y generá prompts IA para tu CV y cartas de presentación." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

  <div class="app-layout">

    <!-- ====== SIDEBAR ====== -->
    <aside class="sidebar" id="sidebar">

      <!-- Sidebar Header / Brand -->
      <div class="sidebar-brand">
        <span class="sidebar-logo">💼</span>
        <div>
          <h1 class="sidebar-title">JobTracker</h1>
          <p class="sidebar-subtitle" id="appSubtitle">Tu asistente de búsqueda laboral</p>
        </div>
      </div>

      <!-- Sidebar Navigation -->
      <nav class="sidebar-nav" role="tablist">
        <button class="sidebar-nav-btn active" role="tab" data-tab="inicio" aria-selected="true">
          <span class="sidebar-nav-ico">🏠</span>
          <span class="sidebar-nav-label">Sobre la aplicación</span>
        </button>
        <button class="sidebar-nav-btn" role="tab" data-tab="busquedas" aria-selected="false">
          <span class="sidebar-nav-ico">🔍</span>
          <span class="sidebar-nav-label">Búsquedas</span>
        </button>
        <button class="sidebar-nav-btn" role="tab" data-tab="aplicaciones" aria-selected="false">
          <span class="sidebar-nav-ico">📋</span>
          <span class="sidebar-nav-label">Aplicaciones</span>
        </button>
        <button class="sidebar-nav-btn" role="tab" data-tab="micv" aria-selected="false">
          <span class="sidebar-nav-ico">👤</span>
          <span class="sidebar-nav-label">Mi CV</span>
        </button>
      </nav>

      <!-- Sidebar CV Selector -->
      <div class="sidebar-cv-selector">
        <label for="cvGlobalSelect" class="sidebar-cv-label">👤 CV Seleccionado:</label>
        <select id="cvGlobalSelect" class="sidebar-cv-select">
          <!-- Populated dynamically -->
        </select>
      </div>

      <!-- Sidebar Footer: Import / Export -->
      <div class="sidebar-footer">
        <p class="sidebar-footer-title">💾 Backup de datos</p>
        <button id="btnExport" class="sidebar-btn sidebar-btn-export">📥 Exportar JSON</button>
        <button id="btnImportTrigger" class="sidebar-btn sidebar-btn-import">📤 Importar JSON</button>
        <input type="file" id="importFile" accept=".json" hidden />
      </div>

    </aside>

    <!-- ====== MAIN CONTENT ====== -->
    <main class="main-content">

      <!-- TAB: SOBRE LA APLICACIÓN (INICIO) -->
      <section id="tab-inicio" class="tab-panel active" role="tabpanel">
        <!-- Content loaded dynamically from inicio.html -->
      </section>

      <!-- TAB: BÚSQUEDAS -->
      <section id="tab-busquedas" class="tab-panel" role="tabpanel">
        <!-- Content loaded dynamically from busquedas.html -->
      </section>

      <!-- TAB: APLICACIONES -->
      <section id="tab-aplicaciones" class="tab-panel" role="tabpanel">
        <!-- Content loaded dynamically from aplicaciones.html -->
      </section>

      <!-- TAB: MI CV -->
      <section id="tab-micv" class="tab-panel" role="tabpanel">
        <!-- Content loaded dynamically from micv.html -->
      </section>

    </main>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- MODAL: CONFIRM DELETE -->
  <div id="modalDelete" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalDeleteTitle" hidden>
    <div class="modal">
      <h3 id="modalDeleteTitle" class="modal-title">¿Eliminar oferta?</h3>
      <p class="modal-body">Esta acción no se puede deshacer.</p>
      <div class="modal-actions">
        <button id="modalCancelBtn" class="btn-modal-cancel">Cancelar</button>
        <button id="modalConfirmBtn" class="btn-modal-confirm">Eliminar</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>

</html>
