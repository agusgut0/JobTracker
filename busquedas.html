<div class="card">
  <h2 class="card-title">➕ Agregar rol de interés</h2>
  <p class="hint-text">Escribí un rol técnico que te interese buscar (ej: Desarrollador Frontend, Analista QA).</p>
  <div class="role-input-row" id="roleInputRow">
    <input id="roleInput" type="text" placeholder="Ej: Analista Funcional" />
    <button id="btnAddRole" class="btn-primary btn-sm">+ Agregar</button>
  </div>
</div>
<div class="card">
  <h2 class="card-title">🏷️ Roles Activos</h2>
  <p class="hint-text">Seleccioná un rol para filtrar las plataformas de búsqueda.</p>
  <div class="role-tabs" id="roleTabs"></div>
</div>
<div class="card">
  <div class="search-header-row">
    <h2 class="card-title" style="margin-bottom: 0;">🎯 Plataformas de Búsqueda</h2>
    <div class="country-selector-container">
      <label for="countrySelect">📍 País:</label>
      <select id="countrySelect" class="country-select">
        <option value="ar">Argentina</option>
        <option value="mx">México</option>
        <option value="co">Colombia</option>
        <option value="cl">Chile</option>
        <option value="es">España</option>
        <option value="uy">Uruguay</option>
        <option value="global">Remoto (Global)</option>
      </select>
    </div>
  </div>
  <div class="btn-grid" id="groupB"></div>
</div>
